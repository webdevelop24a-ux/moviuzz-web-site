<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | N.MoviUz</title>

    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

    <style>
            body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
                        url(img/6000.webp) no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
        }

        .signin-container {
            max-width: 450px;
            margin: 80px auto;
            padding: 50px 40px;
            background-color: rgba(0,0,0,0.85);
            border-radius: 15px;
            box-shadow: 0 0 25px rgba(0,0,0,0.7);
            color: #fff;
            text-align: center;
        }

        .signin-container h1 {
            margin-bottom: 30px;
            font-size: 2.5rem;
            font-weight: bold;
            color: orangered;
        }

        .signin-container a{
            font-size: 18px;
            font-weight: bold;  
        }

        .form-control {
            margin-bottom: 20px;
            border-radius: 10px;
            padding: 15px;
            font-size: 1rem;
        }

        .btn-signin {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            background-color: orangered;
            transition: all 0.3s ease;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.2rem;
            color: white;
        }


        .btn-signin:hover {
            background-color: rgb(160, 57, 19);
            color: white;
        }

        .signup-link {
            margin-top: 15px;
            display: block;
            color: #ccc;
            text-decoration: none;
        }

        .signup-link:hover {
            color: orangered;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="nav">
                <div class="logo">
                    <h2><span style="font-style: italic;color: white;">N.</span>Movi<span>Uz</span></h2>
                </div>
                <div class="menu">
                    <ul>
                        <li><a href="index.html">BOSH SAHIFA</a></li>
                        <li><a href="index.html">KINO'LAR</a></li>
                        <li><a href="index.html">KINO YANGILIKLARI</a></li>
                        <li><a href="index.html">HIZMAT KO'RSATISH</a></li>
                    </ul>
                    <a href="login.html" class="btn">Sign In</a>
                </div>
            </div>
        </div>
    </header>
    <div class="signin-container">
        <h1>Sign In</h1>
        <form id="signinForm">
            <input type="email" class="form-control" placeholder="Email" required>
            <input type="password" class="form-control" placeholder="Password" required>
            <button type="submit" class="btn btn-signin">Sign In</button>
        </form>
        <a href="#" class="signup-link">"Hisobingiz yo‘qmi? Ro‘yxatdan o‘ting"</a>
    </div>



    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js" integrity="sha384-IQsoLXl5PILFhosVNubq5LC7Qb9DXgDA9i+tQ8Zj3iwWAwPtgFTxbJ8NT4GN1R8p" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js" integrity="sha384-cVKIPhGWiC2Al4u+LWgxfKTRIcfu0JTxR+EQDz/bgldoEyl4H0zUF0QKbrJ0EcQF" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>


    <script>
        document.getElementById('signinForm').addEventListener('submit', function(e){
            e.preventDefault(); 
            window.location.href = 'index.html';
        });
    </script>



</body>
</html>
